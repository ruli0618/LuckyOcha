<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OCHA NORMA 抽選結果 交換チェックアプリ</title>
<style>
  :root{
    --bg:#fff8f1;
    --bg2:#fffdf9;
    --surface:#ffffff;
    --surface-soft:#fff4df;
    --line:#eadcc8;
    --line-strong:#d6c7b7;
    --ink:#1f2933;
    --muted:#64748b;
    --red:#d71920;
    --gold:#b88a2f;
    --blue:#4d85c5;
    --orange:#c56635;
    --green:#2e9d49;
    --pink:#d45c8d;
    --gray:#6b7280;
    --shadow:0 12px 32px rgba(31,41,51,.08);
    --shadow-soft:0 6px 18px rgba(31,41,51,.06);
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    color:var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", "Noto Sans JP", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    background:
      radial-gradient(circle at 12% 0%, rgba(255,224,169,.58), transparent 32%),
      radial-gradient(circle at 88% 8%, rgba(255,210,218,.42), transparent 30%),
      linear-gradient(180deg, var(--bg), var(--bg2) 44%, #ffffff);
  }

  .wrap{
    max-width:1240px;
    margin:0 auto;
    padding:22px 16px 44px;
  }

  .hero{
    position:relative;
    overflow:hidden;
    border:1px solid #efd0a0;
    background:
      linear-gradient(135deg, rgba(255,244,223,.98), rgba(255,255,255,.92)),
      radial-gradient(circle at 90% 12%, rgba(215,25,32,.11), transparent 26%);
    border-radius:28px;
    padding:26px 30px;
    margin-bottom:16px;
    box-shadow:var(--shadow);
  }

  .hero::after{
    content:"";
    position:absolute;
    right:-70px;
    top:-90px;
    width:240px;
    height:240px;
    border-radius:50%;
    background:rgba(255,255,255,.42);
    border:28px solid rgba(255,228,180,.48);
  }

  h1{
    position:relative;
    z-index:1;
    font-size:clamp(23px,3.1vw,38px);
    color:var(--red);
    margin:0 0 10px;
    line-height:1.22;
    letter-spacing:.02em;
  }


  h1:empty{
    display:none;
  }

  .subtitle{
    position:relative;
    z-index:1;
    font-weight:850;
    font-size:clamp(15px,2vw,22px);
    line-height:1.55;
  }

  .cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin:16px 0;
  }

  .card{
    border:1px solid rgba(226,216,199,.9);
    border-radius:22px;
    padding:16px 18px;
    background:#fff;
    box-shadow:var(--shadow-soft);
  }

  .card b{
    display:block;
    color:var(--muted);
    margin-bottom:5px;
    font-size:13px;
    letter-spacing:.06em;
  }

  .card span{
    font-size:clamp(19px,2vw,24px);
    font-weight:950;
    line-height:1.25;
  }

  .toolbar, .addbox{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    background:rgba(255,255,255,.88);
    border:1px solid #e4d9cc;
    border-radius:24px;
    padding:12px;
    margin-bottom:12px;
    box-shadow:var(--shadow-soft);
    backdrop-filter: blur(10px);
  }

  .toolbar{
    position:sticky;
    top:10px;
    z-index:3;
  }

  button, select, input{
    border:0;
    border-radius:999px;
    padding:10px 15px;
    font-weight:850;
    font-size:14px;
    line-height:1.2;
  }

  button{
    cursor:pointer;
    background:linear-gradient(180deg, #333944, #252a32);
    color:#fff;
    box-shadow:0 4px 10px rgba(31,41,51,.12);
    transition:transform .12s ease, opacity .12s ease, box-shadow .12s ease;
  }

  button:hover{
    transform:translateY(-1px);
    box-shadow:0 7px 16px rgba(31,41,51,.15);
  }

  button:active{transform:translateY(0)}

  button.secondary{
    background:#ffffff;
    color:#2b2f36;
    border:1px solid #cfd7e3;
    box-shadow:none;
  }

  button.danger{
    background:linear-gradient(180deg, #c7382f, #a8231a);
  }

  button.small{
    padding:7px 10px;
    font-size:12px;
  }

  select,input{
    background:#fff;
    color:#2b2f36;
    border:1px solid #cfd7e3;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
  }

  select.long{
    min-width:420px;
    max-width:100%;
  }

  input.short{
    min-width:90px;
    width:90px;
  }

  .hint{
    font-size:13px;
    color:var(--muted);
    margin-left:auto;
    font-weight:700;
  }

  .add-title{
    font-weight:950;
    color:#475569;
    margin-right:4px;
    padding:0 4px;
  }

  table{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    overflow:hidden;
    border:1px solid var(--line-strong);
    border-radius:24px;
    background:#fff;
    box-shadow:var(--shadow);
  }

  thead th{
    background:linear-gradient(180deg, #343a44, #272d36);
    color:#fff;
    padding:14px 12px;
    text-align:left;
    font-size:13px;
    letter-spacing:.04em;
    white-space:nowrap;
  }

  tbody td{
    padding:13px 12px;
    border-top:1px solid var(--line);
    vertical-align:middle;
    font-size:15px;
  }

  tbody tr{
    transition:background .12s ease, opacity .12s ease;
  }

  tbody tr:nth-child(even){background:#fffaf3}
  tbody tr:hover{background:#fff3e3}

  tbody tr.done{
    opacity:.58;
    background:#eef7ee;
  }

  tbody tr.done .member, tbody tr.done .item{
    text-decoration:line-through;
  }

  .checkcell{
    text-align:center;
    width:72px;
  }

  input[type="checkbox"]{
    width:28px;
    height:28px;
    min-width:auto;
    accent-color:#2e9d49;
    cursor:pointer;
    padding:0;
  }

  .badge{
    display:inline-block;
    min-width:62px;
    text-align:center;
    color:white;
    font-weight:950;
    border-radius:999px;
    padding:6px 10px;
    box-shadow:inset 0 -1px 0 rgba(0,0,0,.12);
  }

  .a{background:var(--gold)}
  .b{background:var(--blue)}
  .c{background:var(--orange)}
  .d{background:var(--green)}
  .e{background:var(--pink)}
  .other{background:var(--gray)}

  .member{
    font-weight:950;
    font-size:17px;
    white-space:nowrap;
  }

  .item{
    font-weight:850;
  }

  .qty{
    font-weight:950;
    font-size:17px;
  }

  .no{
    font-weight:950;
    color:var(--muted);
    font-size:14px;
  }

  .actions{
    white-space:nowrap;
  }

  .memoInput{
    width:100%;
    min-width:180px;
    border-radius:14px;
    padding:9px 11px;
    font-weight:750;
    font-size:14px;
    background:#fff;
    border:1px solid #cfd7e3;
  }

  .memoText{
    font-weight:850;
    color:#374151;
    white-space:pre-wrap;
  }

  .memoMosaic{
    display:inline-block;
    min-width:120px;
    min-height:1.35em;
    border-radius:8px;
    background:
      linear-gradient(45deg, rgba(31,41,51,.32) 25%, transparent 25% 75%, rgba(31,41,51,.32) 75%),
      linear-gradient(45deg, rgba(31,41,51,.18) 25%, transparent 25% 75%, rgba(31,41,51,.18) 75%),
      #e5e7eb;
    background-position:0 0, 6px 6px;
    background-size:12px 12px;
    color:transparent;
  }

  body.memoHidden .memoInput{
    color:transparent;
    caret-color:#1f2933;
    background:
      linear-gradient(45deg, rgba(31,41,51,.30) 25%, transparent 25% 75%, rgba(31,41,51,.30) 75%),
      linear-gradient(45deg, rgba(31,41,51,.16) 25%, transparent 25% 75%, rgba(31,41,51,.16) 75%),
      #e5e7eb;
    background-position:0 0, 6px 6px;
    background-size:12px 12px;
  }

  body.memoHidden .memoInput::placeholder{
    color:transparent;
  }

  .tradeTextarea{
    width:100%;
    min-height:150px;
    border-radius:18px;
    padding:13px 15px;
    font-weight:750;
    font-size:14px;
    line-height:1.7;
    background:#fff;
    color:#1f2933;
    border:1px solid #cfd7e3;
    resize:vertical;
    flex-basis:100%;
  }

  .exportScratch{
    position:absolute;
    left:0;
    top:0;
    width:1200px;
    background:#fffdf8;
    opacity:0.01;
    pointer-events:none;
    z-index:-1;
  }

  .footer{
    color:var(--muted);
    font-size:13px;
    margin-top:12px;
    line-height:1.7;
    background:rgba(255,255,255,.72);
    border:1px dashed #dfd2c3;
    border-radius:16px;
    padding:10px 14px;
  }

  @media (max-width:900px){
    .wrap{
      padding:10px 8px 32px;
    }

    .hero{
      padding:16px 16px;
      border-radius:20px;
      margin-bottom:10px;
    }

    h1{
      font-size:21px;
      margin-bottom:6px;
    }

    .subtitle{
      font-size:14px;
      line-height:1.45;
    }

    .cards{
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin:10px 0;
    }

    .card{
      border-radius:16px;
      padding:11px 12px;
    }

    .card:first-child{
      grid-column:1 / -1;
    }

    .card b{
      font-size:12px;
      margin-bottom:2px;
    }

    .card span{
      font-size:17px;
    }

    .toolbar, .addbox{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      border-radius:18px;
      padding:10px;
      margin-bottom:10px;
    }

    .toolbar{
      position:relative;
      top:auto;
    }

    button, select, input{
      width:100%;
      min-width:0;
      padding:9px 10px;
      font-size:13px;
    }

    .toolbar button:first-child{
      grid-column:1 / -1;
      font-size:14px;
      padding:11px 10px;
    }

    .toolbar select,
    .hint{
      grid-column:1 / -1;
    }

    .hint{
      width:100%;
      margin-left:0;
      font-size:12px;
      padding:0 2px;
    }

    .add-title{
      grid-column:1 / -1;
      padding:0 2px;
      font-size:14px;
    }

    select.long{
      min-width:0;
      grid-column:1 / -1;
    }

    #addMember{
      grid-column:1 / 2;
    }

    #addQty{
      grid-column:2 / 3;
    }

    #addOne{
      grid-column:1 / -1;
    }

    .tradeTextarea{
      min-height:110px;
      max-height:220px;
      font-size:13px;
      line-height:1.6;
      border-radius:14px;
      padding:10px 12px;
      grid-column:1 / -1;
    }

    #copyUncheckedText,
    #postToTwitter{
      grid-column:auto;
    }

    table, thead, tbody, tr, th, td{
      display:block;
    }

    thead{
      display:none;
    }

    tbody tr{
      border-top:1px solid var(--line);
      padding:10px;
      border-radius:16px;
      margin:8px;
      background:#fff;
      box-shadow:0 4px 12px rgba(31,41,51,.06);
    }

    tbody tr:nth-child(even){
      background:#fffaf3;
    }

    tbody td{
      border:0;
      padding:6px 2px;
      display:grid;
      grid-template-columns:6.5em 1fr;
      gap:8px;
      align-items:center;
      font-size:14px;
    }

    tbody td::before{
      content:attr(data-label);
      color:var(--muted);
      font-weight:850;
      font-size:12px;
      letter-spacing:.02em;
    }

    .checkcell{
      text-align:left;
      width:auto;
    }

    .checkcell::before{
      content:"交換決まり";
      color:var(--muted);
      font-weight:850;
      font-size:12px;
    }

    input[type="checkbox"]{
      width:24px;
      height:24px;
    }

    .member{
      font-size:16px;
      white-space:normal;
    }

    .qty{
      font-size:16px;
    }

    .memoInput{
      min-width:0;
      border-radius:12px;
      padding:8px 10px;
    }

    .actions{
      display:flex;
      gap:8px;
    }

    .actions::before{
      display:none;
    }

    .actions button{
      width:auto;
      flex:1;
    }

    .footer{
      font-size:12px;
      border-radius:14px;
      padding:9px 10px;
    }
  }

  @media (max-width:430px){
    .toolbar, .addbox{
      gap:7px;
      padding:9px;
    }

    button, select, input{
      font-size:12.5px;
      padding:8px 9px;
    }

    .toolbar button:first-child{
      font-size:13.5px;
    }

    .cards{
      grid-template-columns:1fr;
    }

    .card:first-child{
      grid-column:auto;
    }
  }
</style>
</head>
<body>
<div class="wrap" id="capture">
  <section class="hero">
    <h1 id="collageTitle" aria-label="画像タイトル（任意）"></h1>
    <div class="subtitle">OCHA NORMA 6thシングル<br>『ダントツで愛して／また、あなたに恋焦がれているんだ』</div>
  </section>

  <section class="cards">
    <div class="card" style="background:#fff0cf"><b>合計</b><span id="totalCount">0点</span></div>
    <div class="card" style="background:#edf7ff"><b>賞別</b><span id="prizeSummary">-</span></div>
    <div class="card" style="background:#f4f1ff"><b>衣装別</b><span id="costumeSummary">-</span></div>
  </section>

  <section class="toolbar" data-html2canvas-ignore="true">
    <button id="savePng">画像保存</button>
    <button id="saveUncheckedPng" class="secondary">未チェック景品だけ画像保存</button>
    <button id="savePngMosaic" class="secondary">メモを隠して画像保存</button>
    <button id="toggleMemoMask" class="secondary">メモを表示中も隠す</button>
    <button id="saveJson" class="secondary">チェック状態をデータ保存</button>
    <button id="loadJson" class="secondary">データ読込</button>
    <input id="fileInput" type="file" accept="application/json" hidden>
    <button id="reset" class="danger">チェック全解除</button>
    <button id="resetAll" class="danger">全部初期化</button>
    <select id="sort" aria-label="並べ替え順">
      <option value="prizeItemNo" selected>レアリティ ＞ 商品名 ＞ 序列</option>
      <option value="prizeMember">レアリティ ＞ メンバー順</option>
      <option value="member">メンバー順</option>
      <option value="checked">未交換を上に表示</option>
      <option value="added">追加順で表示</option>
    </select>
    <button id="applySort" class="secondary">ソート適用</button>
    <div class="hint">並べ替えは「ソート適用」を押すと反映されます</div>
  </section>

  <section class="addbox" data-html2canvas-ignore="true">
    <div class="add-title">景品追加</div>
    <select id="addPrizeItem" class="long"></select>
    <select id="addMember"></select>
    <input id="addQty" class="short" type="number" min="1" value="1" title="数量">
    <button id="addOne">追加</button>
  </section>

  <section class="addbox" data-html2canvas-ignore="true">
    <div class="add-title">交換用テキスト</div>
    <button id="copyUncheckedText" class="secondary">テキストをコピー</button>
    <button id="postToTwitter" class="secondary">Xに投稿</button>
    <textarea id="uncheckedText" class="tradeTextarea" placeholder="ガチャ名＋未チェックのアイテムがここに出ます"></textarea>
  </section>

  <table id="table">
    <thead>
      <tr>
        <th>交換決まり</th><th>賞</th><th>内容</th><th>メンバー</th><th>衣装</th><th>数量</th><th>メモ</th><th data-html2canvas-ignore="true">操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="footer" data-save-ignore="true">
    ※交換が決まったものは左端にチェック。画像保存すると、チェック済みの状態をそのまま共有用画像にできます。<br>
    ※メモ欄に交換予定・交換相手・希望品などを書けます。共有用には「メモを隠して画像保存」や、未チェック景品のみの画像保存も使えます。同じ内容のチェキも <b>No.を分けて別々管理</b> できます。表記確認：<b>西﨑美空</b>（「西崎」ではなく「西﨑」）
  </div>
</div>

<div id="exportScratch" class="exportScratch" data-html2canvas-ignore="true"></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const members = [
  "斉藤円香",
  "広本瑠璃",
  "米村姫良々",
  "窪田七海",
  "中山夏月姫",
  "西﨑美空",
  "北原もも",
  "筒井澪心",
  "集合"
];

const memberOrder = [
  "斉藤円香",
  "広本瑠璃",
  "米村姫良々",
  "窪田七海",
  "中山夏月姫",
  "西﨑美空",
  "北原もも",
  "筒井澪心",
  "集合"
];

function memberRank(name){
  const idx = memberOrder.indexOf(name);
  return idx === -1 ? 999 : idx;
}

const prizeItems = [
  {prize:"A賞", costume:"『ダントツで愛して』衣装", item:"A5アクリルプレート", label:"A賞: 『ダントツで愛して』衣装着用A5アクリルプレート"},
  {prize:"B賞", costume:"『ダントツで愛して』衣装", item:"A4クリアポスター", label:"B賞: 『ダントツで愛して』衣装着用A4クリアポスター"},
  {prize:"C賞", costume:"『ダントツで愛して』衣装", item:"オリジナルチェキ", label:"C賞: 『ダントツで愛して』衣装着用オリジナルチェキ"},
  {prize:"D賞", costume:"『ダントツで愛して』衣装", item:"撮りおろしL版ブロマイド", label:"D賞: 『ダントツで愛して』衣装着用撮りおろしL版ブロマイド"},
  {prize:"E賞", costume:"『ダントツで愛して』衣装", item:"撮りおろしL版ブロマイド 集合", label:"E賞: 『ダントツで愛して』衣装着用撮りおろしL版ブロマイド 集合", forceMember:"集合"},

  {prize:"C賞", costume:"『また、あなたに恋焦がれているんだ』衣装", item:"オリジナルチェキ", label:"C賞: 『また、あなたに恋焦がれているんだ』衣装着用オリジナルチェキ"},
  {prize:"D賞", costume:"『また、あなたに恋焦がれているんだ』衣装", item:"撮りおろしL版ブロマイド", label:"D賞: 『また、あなたに恋焦がれているんだ』衣装着用撮りおろしL版ブロマイド"},
  {prize:"E賞", costume:"『また、あなたに恋焦がれているんだ』衣装", item:"撮りおろしL版ブロマイド 集合", label:"E賞: 『また、あなたに恋焦がれているんだ』衣装着用撮りおろしL版ブロマイド 集合", forceMember:"集合"},

  {prize:"C賞", costume:"『ライアーライナー』衣装", item:"オリジナルチェキ", label:"C賞: 『ライアーライナー』衣装着用オリジナルチェキ"},
  {prize:"D賞", costume:"『ダントツで愛して』衣装", item:"撮りおろしL版ブロマイド", label:"D賞: 『ダントツで愛して』衣装着用撮りおろしL版ブロマイド"},
  {prize:"E賞", costume:"『ダントツで愛して』衣装", item:"撮りおろしL版ブロマイド 集合", label:"E賞: 『ダントツで愛して』衣装着用撮りおろしL版ブロマイド 集合", forceMember:"集合"}
];

const defaultRows = []

const STORE_ROWS = "ochaLuckyDrawRows_v5_blank";
const STORE_CHECKED = "ochaLuckyDrawChecked_v5_blank";

const STORE_MEMO_MASK = "ochaLuckyDrawMemoMask_v5_blank";

let rows = JSON.parse(localStorage.getItem(STORE_ROWS) || "null") || structuredClone(defaultRows);
let checked = JSON.parse(localStorage.getItem(STORE_CHECKED) || "{}");
let memoMaskVisible = localStorage.getItem(STORE_MEMO_MASK) === "true";
let viewRows = [...rows];

function applyMemoMaskState(){
  document.body.classList.toggle("memoHidden", memoMaskVisible);
  const btn = document.getElementById("toggleMemoMask");
  if(btn){
    btn.textContent = memoMaskVisible ? "メモの表示を戻す" : "メモを表示中も隠す";
  }
}

function initSelects(){
  const prizeSelect = document.getElementById("addPrizeItem");

  const prizeOrder = ["A賞", "B賞", "C賞", "D賞", "E賞"];
  const groupedHtml = prizeOrder.map(prize => {
    const options = prizeItems
      .map((p, i) => ({...p, originalIndex:i}))
      .filter(p => p.prize === prize)
      .map(p => `<option value="${p.originalIndex}">${escapeHtml(p.label.replace(p.prize + ": ", ""))}</option>`)
      .join("");
    return options ? `<optgroup label="${prize}">${options}</optgroup>` : "";
  }).join("");

  prizeSelect.innerHTML = groupedHtml;

  const memSelect = document.getElementById("addMember");
  memSelect.innerHTML = members.map(m=>`<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`).join("");
  prizeSelect.addEventListener("change", updateMemberForPrize);
  updateMemberForPrize();
}

function updateMemberForPrize(){
  const p = prizeItems[Number(document.getElementById("addPrizeItem").value)];
  const mem = document.getElementById("addMember");
  if(p.forceMember){
    mem.value = p.forceMember;
    mem.disabled = true;
  } else {
    mem.disabled = false;
    if(mem.value === "集合") mem.value = "斉藤円香";
  }
}

function rankFor(prize){
  if(prize === "A賞") return 1;
  if(prize === "B賞") return 2;
  if(prize === "C賞") return 3;
  if(prize === "D賞") return 4;
  if(prize === "E賞") return 5;
  return 9;
}

function saveAll(){
  localStorage.setItem(STORE_ROWS, JSON.stringify(rows));
  localStorage.setItem(STORE_CHECKED, JSON.stringify(checked));
}

function nextNo(){
  const max = rows.reduce((m,r)=>Math.max(m, Number(r.no)||0), 0);
  return String(max + 1).padStart(2, "0");
}

function badgeClass(prize){
  if(prize.startsWith("A")) return "a";
  if(prize.startsWith("B")) return "b";
  if(prize.startsWith("C")) return "c";
  if(prize.startsWith("D")) return "d";
  if(prize.startsWith("E")) return "e";
  return "other";
}

function summarize(){
  document.getElementById("totalCount").textContent = rows.reduce((s,r)=>s + Number(r.qty || 1), 0) + "点";
  const prizeOrder = ["A賞","B賞","C賞","D賞","E賞","その他"];
  const byPrize = {};
  rows.forEach(r=>byPrize[r.prize]=(byPrize[r.prize]||0)+Number(r.qty||1));
  document.getElementById("prizeSummary").textContent =
    prizeOrder.filter(p=>byPrize[p]).map(p=>`${p}${byPrize[p]}`).join(" / ") || "-";

  const dantotsu = rows.filter(r=>r.costume.includes("ダントツ")).reduce((s,r)=>s+Number(r.qty||1),0);
  const mata = rows.filter(r=>r.costume.includes("また、あなた") || r.costume.includes("恋焦がれて")).reduce((s,r)=>s+Number(r.qty||1),0);
  const liar = rows.filter(r=>r.costume.includes("ライアーライナー")).reduce((s,r)=>s+Number(r.qty||1),0);
  const other = rows.reduce((s,r)=>s+Number(r.qty||1),0) - dantotsu - mata - liar;
  const parts = [];
  if(dantotsu) parts.push(`ダントツ${dantotsu}`);
  if(mata) parts.push(`また恋${mata}`);
  if(liar) parts.push(`ライアー${liar}`);
  if(other) parts.push(`その他${other}`);
  document.getElementById("costumeSummary").textContent = parts.join(" / ") || "-";
}

function render(){
  summarize();
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";
  viewRows.forEach(r => {
    const tr = document.createElement("tr");
    if(checked[r.id]) tr.classList.add("done");
    tr.innerHTML = `
      <td class="checkcell"><input type="checkbox" ${checked[r.id] ? "checked" : ""} data-id="${r.id}"></td>
      <td data-label="賞"><span class="badge ${badgeClass(r.prize)}">${escapeHtml(r.prize)}</span></td>
      <td data-label="内容" class="item">${escapeHtml(r.item)}</td>
      <td data-label="メンバー" class="member">${escapeHtml(r.member)}</td>
      <td data-label="衣装">${escapeHtml(r.costume)}</td>
      <td data-label="数量" class="qty">×${Number(r.qty || 1)}</td>
      <td data-label="メモ">
        <input class="memoInput" data-memo="${r.id}" value="${escapeAttr(r.memo || "")}" placeholder="例：〇〇と交換予定">
      </td>
      <td data-label="操作" class="actions" data-html2canvas-ignore="true">
        <button class="small secondary" data-edit="${r.id}">編集</button>
        <button class="small danger" data-del="${r.id}">削除</button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  document.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
    cb.addEventListener("change", e=>{
      checked[e.target.dataset.id] = e.target.checked;
      saveAll();
      render();
    });
  });

  document.querySelectorAll("[data-memo]").forEach(input=>{
    input.addEventListener("input", e=>{
      const target = rows.find(r=>r.id===e.target.dataset.memo);
      if(target){
        target.memo = e.target.value;
        saveAll();
      }
    });
  });
  document.querySelectorAll("[data-del]").forEach(btn=>{
    btn.addEventListener("click", e=>{
      const id = e.target.dataset.del;
      const target = rows.find(r=>r.id===id);
      if(confirm(`「${target.member} / ${target.item}」を削除しますか？`)){
        rows = rows.filter(r=>r.id!==id);
        delete checked[id];
        saveAll();
        refreshRowsWithoutSorting();
      }
    });
  });
  document.querySelectorAll("[data-edit]").forEach(btn=>{
    btn.addEventListener("click", e=>{
      editRow(e.target.dataset.edit);
    });
  });

  updateUncheckedText();
}

function sortRows(mode){
  viewRows = [...rows];
  if(mode === "member"){
    viewRows.sort((a,b)=> memberRank(a.member)-memberRank(b.member) || a.member.localeCompare(b.member, "ja") || a.rank-b.rank || Number(a.no)-Number(b.no));
  } else if(mode === "prizeMember"){
    viewRows.sort((a,b)=> a.rank-b.rank || memberRank(a.member)-memberRank(b.member) || a.member.localeCompare(b.member, "ja") || Number(a.no)-Number(b.no));
  } else if(mode === "checked"){
    viewRows.sort((a,b)=> (Boolean(checked[a.id])===Boolean(checked[b.id]) ? (a.rank-b.rank || memberRank(a.member)-memberRank(b.member) || Number(a.no)-Number(b.no)) : Number(Boolean(checked[a.id]))-Number(Boolean(checked[b.id]))));
  } else if(mode === "added"){
    viewRows.sort((a,b)=> Number(a.createdAt)-Number(b.createdAt));
  } else {
    viewRows.sort((a,b)=> a.rank-b.rank || String(a.item || "").localeCompare(String(b.item || ""), "ja") || Number(a.no)-Number(b.no));
  }
  render();
}

function refreshRowsWithoutSorting(){
  viewRows = [...rows];
  render();
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[s]));
}

function escapeAttr(str){
  return String(str).replace(/[&<>"']/g, s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[s]));
}

function addRow(){
  const selected = prizeItems[Number(document.getElementById("addPrizeItem").value)];
  const member = selected.forceMember || document.getElementById("addMember").value;
  const qty = Math.max(1, Number(document.getElementById("addQty").value || 1));

  for(let i=0; i<qty; i++){
    const no = nextNo();
    const id = `custom-${Date.now()}-${Math.random().toString(36).slice(2,8)}-${i}`;
    rows.push({
      id, no,
      prize:selected.prize,
      rank:rankFor(selected.prize),
      item:selected.item,
      member,
      costume:selected.costume,
      qty:1,
      memo:"",
      createdAt: Date.now() + i,
      fixed:false
    });
  }

  document.getElementById("addQty").value = 1;
  saveAll();
  refreshRowsWithoutSorting();
}

function editRow(id){
  const r = rows.find(x=>x.id===id);
  if(!r) return;
  const prize = prompt("賞を編集", r.prize);
  if(prize === null) return;
  const item = prompt("内容を編集", r.item);
  if(item === null) return;
  const member = prompt("メンバー名を編集", r.member);
  if(member === null) return;
  const costume = prompt("衣装を編集", r.costume);
  if(costume === null) return;
  const memo = prompt("メモを編集", r.memo || "");
  if(memo === null) return;

  r.prize = prize.trim() || r.prize;
  r.rank = rankFor(r.prize);
  r.item = item.trim() || r.item;
  r.member = member.trim() || r.member;
  r.costume = costume.trim() || r.costume;
  r.memo = memo.trim();
  saveAll();
  refreshRowsWithoutSorting();
}


function getUncheckedRows(){
  return viewRows.filter(r => !checked[r.id]);
}

function buildUncheckedText(){
  const items = getUncheckedRows();
  const header = [
    "【楽天ブックス オンラインラッキードロー】OCHA NORMA",
    "",
    "(譲)"
  ];

  if(!items.length){
    return [...header, "なし"].join("\n");
  }

  return [...header, ...items.map(r => {
    const parts = [r.prize, r.item];
    if(r.member) parts.push(r.member);
    if(r.costume) parts.push(`（${r.costume}）`);
    return parts.join(" ");
  })].join("\n");
}

function updateUncheckedText(){
  const textarea = document.getElementById("uncheckedText");
  if(textarea){
    textarea.value = buildUncheckedText();
  }
}

function buildPrizeSummaryFromItems(items){
  const prizeOrder = ["A賞","B賞","C賞","D賞","E賞","その他"];
  const byPrize = {};
  items.forEach(r => byPrize[r.prize] = (byPrize[r.prize] || 0) + Number(r.qty || 1));
  return prizeOrder.filter(p => byPrize[p]).map(p => `${p}${byPrize[p]}`).join(" / ") || "-";
}

function roundRect(ctx, x, y, w, h, r){
  const radius = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.arcTo(x + w, y, x + w, y + h, radius);
  ctx.arcTo(x + w, y + h, x, y + h, radius);
  ctx.arcTo(x, y + h, x, y, radius);
  ctx.arcTo(x, y, x + w, y, radius);
  ctx.closePath();
}

function wrapCanvasText(ctx, text, maxWidth){
  const chars = String(text || "").split("");
  const lines = [];
  let line = "";
  chars.forEach(ch => {
    const test = line + ch;
    if(ctx.measureText(test).width <= maxWidth || !line){
      line = test;
    }else{
      lines.push(line);
      line = ch;
    }
  });
  if(line) lines.push(line);
  return lines;
}

function badgeColor(prize){
  if(String(prize).startsWith("A")) return "#b88a2f";
  if(String(prize).startsWith("B")) return "#4d85c5";
  if(String(prize).startsWith("C")) return "#c56635";
  if(String(prize).startsWith("D")) return "#2e9d49";
  if(String(prize).startsWith("E")) return "#d45c8d";
  return "#6b7280";
}

function drawTextLines(ctx, text, x, y, maxWidth, lineHeight, maxLines){
  const lines = wrapCanvasText(ctx, text, maxWidth).slice(0, maxLines || 99);
  lines.forEach((line, i) => ctx.fillText(line, x, y + i * lineHeight));
}

async function saveUncheckedImage(){
  const items = getUncheckedRows();
  if(!items.length){
    alert("未チェックのアイテムはありません。");
    return;
  }

  const previewWindow = openPreviewWindow("未チェック景品画像");
  if(!previewWindow) return;

  const scale = 2;
  const W = 1080;
  const margin = 30;
  const headerH = 50;
  const rowH = 82;
  const tableW = W - margin * 2;
  const H = margin + headerH + rowH * items.length + margin;

  const canvas = document.createElement("canvas");
  canvas.width = W * scale;
  canvas.height = H * scale;
  const ctx = canvas.getContext("2d");
  ctx.scale(scale, scale);

  ctx.fillStyle = "#fffdf8";
  ctx.fillRect(0, 0, W, H);
  ctx.textBaseline = "top";

  const tableY = margin;
  const cols = [
    {key:"prize", label:"賞", w:78},
    {key:"item", label:"景品", w:270},
    {key:"member", label:"メンバー", w:150},
    {key:"costume", label:"衣装", w:370},
    {key:"memo", label:"メモ", w:tableW - 78 - 270 - 150 - 370}
  ];

  roundRect(ctx, margin, tableY, tableW, headerH + rowH * items.length, 18);
  ctx.fillStyle = "#ffffff";
  ctx.fill();
  ctx.strokeStyle = "#cfc7bb";
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.save();
  roundRect(ctx, margin, tableY, tableW, headerH, 18);
  ctx.clip();
  ctx.fillStyle = "#2b2f36";
  ctx.fillRect(margin, tableY, tableW, headerH);
  ctx.restore();
  ctx.fillStyle = "#2b2f36";
  ctx.fillRect(margin, tableY + 18, tableW, headerH - 18);

  let x = margin;
  ctx.font = '800 15px system-ui, -apple-system, "Segoe UI", "Noto Sans JP", Meiryo, sans-serif';
  cols.forEach(col => {
    ctx.fillStyle = "#ffffff";
    ctx.fillText(col.label, x + 12, tableY + 16);
    x += col.w;
  });

  items.forEach((r, idx) => {
    const y = tableY + headerH + idx * rowH;
    ctx.fillStyle = idx % 2 ? "#fffaf2" : "#ffffff";
    ctx.fillRect(margin, y, tableW, rowH);
    ctx.strokeStyle = "#ded7ca";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(margin, y);
    ctx.lineTo(margin + tableW, y);
    ctx.stroke();

    x = margin;

    roundRect(ctx, x + 12, y + 25, 54, 32, 16);
    ctx.fillStyle = badgeColor(r.prize);
    ctx.fill();
    ctx.font = '900 15px system-ui, -apple-system, "Segoe UI", "Noto Sans JP", Meiryo, sans-serif';
    ctx.fillStyle = "#ffffff";
    ctx.fillText(String(r.prize || ""), x + 21, y + 33);
    x += cols[0].w;

    ctx.font = '900 17px system-ui, -apple-system, "Segoe UI", "Noto Sans JP", Meiryo, sans-serif';
    ctx.fillStyle = "#1f2933";
    drawTextLines(ctx, r.item, x + 12, y + 21, cols[1].w - 24, 21, 2);
    x += cols[1].w;

    ctx.font = '900 18px system-ui, -apple-system, "Segoe UI", "Noto Sans JP", Meiryo, sans-serif';
    ctx.fillStyle = "#1f2933";
    drawTextLines(ctx, r.member, x + 12, y + 30, cols[2].w - 24, 22, 1);
    x += cols[2].w;

    ctx.font = '800 15px system-ui, -apple-system, "Segoe UI", "Noto Sans JP", Meiryo, sans-serif';
    ctx.fillStyle = "#1f2933";
    drawTextLines(ctx, r.costume, x + 12, y + 20, cols[3].w - 24, 21, 2);
    x += cols[3].w;

    ctx.font = '800 14px system-ui, -apple-system, "Segoe UI", "Noto Sans JP", Meiryo, sans-serif';
    ctx.fillStyle = "#374151";
    drawTextLines(ctx, r.memo || "-", x + 12, y + 21, cols[4].w - 24, 20, 2);

    let vx = margin;
    ctx.strokeStyle = "#eee6da";
    cols.slice(0, -1).forEach(col => {
      vx += col.w;
      ctx.beginPath();
      ctx.moveTo(vx, y);
      ctx.lineTo(vx, y + rowH);
      ctx.stroke();
    });
  });

  const dataUrl = canvas.toDataURL("image/png");
  showImageInPreviewWindow(previewWindow, dataUrl, "未チェック景品画像");
}

async function saveImage({mosaicMemo = false} = {}){
  const title = mosaicMemo ? "メモを隠した画像" : "画像プレビュー";
  const previewWindow = openPreviewWindow(title);
  if(!previewWindow) return;

  const target = document.getElementById("capture");

  const originalStyle = {
    width: target.style.width,
    maxWidth: target.style.maxWidth,
    minWidth: target.style.minWidth,
    margin: target.style.margin
  };

  // モバイル表示中でも、保存用画像だけはPC幅のレイアウトで作る
  target.style.width = "1240px";
  target.style.maxWidth = "1240px";
  target.style.minWidth = "1240px";
  target.style.margin = "0 auto";

  document.querySelectorAll(".memoInput").forEach(input=>{
    const span = document.createElement("span");
    span.className = mosaicMemo ? "memoMosaic" : "memoText";
    span.textContent = mosaicMemo ? "＊＊＊＊＊＊＊＊" : (input.value || "");
    span.dataset.memoPrint = "true";
    input.style.display = "none";
    input.parentNode.appendChild(span);
  });

  await new Promise(resolve => requestAnimationFrame(resolve));

  const canvas = await html2canvas(target, {
    scale: 2,
    backgroundColor: "#fffdf8",
    width: 1240,
    windowWidth: 1400,
    windowHeight: Math.max(target.scrollHeight + 200, 1200),
    ignoreElements: el => el.hasAttribute && (el.hasAttribute("data-html2canvas-ignore") || el.hasAttribute("data-save-ignore"))
  });

  document.querySelectorAll("[data-memo-print]").forEach(span=>span.remove());
  document.querySelectorAll(".memoInput").forEach(input=>input.style.display = "");

  target.style.width = originalStyle.width;
  target.style.maxWidth = originalStyle.maxWidth;
  target.style.minWidth = originalStyle.minWidth;
  target.style.margin = originalStyle.margin;

  const dataUrl = canvas.toDataURL("image/png");
  showImageInPreviewWindow(previewWindow, dataUrl, title);
}
